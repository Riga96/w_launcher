<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="웹툰 런처" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>웹툰 런처</title>
  <style>
    :root {
      --bg: #0f172a; --bg2: #020617; --card: #111827;
      --border: #1e293b; --muted: #64748b; --text: #f1f5f9;
      --accent: #60a5fa; --accent-dim: rgba(96,165,250,0.15); --accent-border: rgba(96,165,250,0.3);
      --input: #0b1220; --danger: #fb7185;
      --ok: rgba(6,78,59,0.85); --ok-b: rgba(52,211,153,0.4);
      --err: rgba(76,5,25,0.85); --err-b: rgba(251,113,133,0.4);
      --info: rgba(23,37,84,0.85); --info-b: rgba(96,165,250,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      padding: calc(env(safe-area-inset-top,16px) + 16px) 16px calc(env(safe-area-inset-bottom,0px) + 40px);
    }
    .wrap { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

    /* Header */
    .hdr { display: flex; align-items: center; justify-content: space-between; padding-bottom: 4px; }
    .hdr-left { display: flex; align-items: center; gap: 10px; }
    .hdr-icon { width: 36px; height: 36px; border-radius: 10px; background: #111827; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .hdr-icon img { width: 26px; height: 26px; }
    .hdr h1 { font-size: 19px; font-weight: 700; line-height: 1.2; }
    .hdr p { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .icon-btn { width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 10px; background: var(--card); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; flex-shrink: 0; transition: border-color .15s; }
    .icon-btn:hover { border-color: var(--accent-border); }

    /* Settings panel */
    .settings { background: rgba(17,24,39,0.6); border: 1px solid var(--border); border-radius: 16px; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .settings-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }

    /* Clipboard btn */
    .clip-btn {
      width: 100%; height: 56px; border-radius: 16px;
      background: var(--accent-dim); border: 1px solid var(--accent-border);
      color: var(--accent); font-size: 16px; font-weight: 700; font-family: inherit;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .clip-btn:hover { background: rgba(96,165,250,0.22); border-color: rgba(96,165,250,0.5); }
    .clip-btn:active { opacity: 0.8; }

    /* Search */
    .search-wrap { position: relative; }
    .search-wrap .si { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
    .search-wrap input { padding-left: 36px; height: 44px; border-radius: 12px; }

    /* Inputs */
    input, textarea {
      background: var(--input); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 13px; padding: 9px 12px; width: 100%;
      outline: none; font-family: inherit; -webkit-appearance: none; transition: border-color .15s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    textarea { min-height: 60px; resize: vertical; }
    .mono { font-family: ui-monospace, monospace; font-size: 12px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 11px; color: var(--muted); font-weight: 500; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .split { display: flex; gap: 8px; }
    .split input { flex: 1; }

    /* Buttons */
    button {
      border: none; border-radius: 10px; cursor: pointer;
      font-family: inherit; font-size: 13px; font-weight: 500;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      transition: opacity .15s, background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { opacity: 0.75; }
    .btn-primary { background: var(--accent); color: #0f172a; font-weight: 700; padding: 11px 20px; }
    .btn-secondary { background: #1e293b; color: var(--text); padding: 10px 14px; border: 1px solid var(--border); }
    .btn-ghost { background: transparent; color: var(--muted); padding: 10px 14px; }
    .btn-danger { background: transparent; color: var(--danger); padding: 8px 12px; font-size: 12px; border-radius: 8px; }
    .btn-sm { padding: 7px 12px; font-size: 12px; border-radius: 8px; }
    .btn-file { position: relative; overflow: hidden; }
    .btn-file input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

    /* Bookmark card */
    .bm-card { background: rgba(17,24,39,0.7); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; transition: border-color .2s; }
    .bm-card.fav { border-color: rgba(234,179,8,0.4); }
    .bm-card:hover { border-color: rgba(96,165,250,0.3); }
    .bm-top { display: flex; align-items: center; gap: 10px; padding: 12px 12px 8px; }

    /* Color badge */
    .bm-badge { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #0f172a; flex-shrink: 0; }
    .bm-cover { width: 48px; height: 48px; border-radius: 12px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }

    .bm-info { flex: 1; min-width: 0; }
    .bm-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 5px; }
    .bm-star { font-size: 11px; color: #facc15; flex-shrink: 0; }
    .bm-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .ep-badge { display: inline-flex; align-items: center; gap: 3px; background: var(--accent-dim); border: 1px solid var(--accent-border); border-radius: 6px; color: var(--accent); font-family: ui-monospace, monospace; font-size: 11px; font-weight: 700; padding: 2px 7px; cursor: pointer; transition: background .15s; }
    .ep-badge:hover { background: rgba(96,165,250,0.25); }
    .ep-input { width: 52px; height: 22px; padding: 1px 4px; border-radius: 6px; font-size: 11px; font-family: ui-monospace, monospace; color: var(--accent); border: 1px solid var(--accent); background: var(--input); text-align: center; outline: none; }
    .bm-domain { font-size: 10px; color: var(--muted); font-family: ui-monospace, monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }

    /* Card action icons */
    .bm-actions { display: flex; gap: 2px; flex-shrink: 0; }
    .act-btn { width: 32px; height: 32px; background: transparent; border: none; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; color: var(--muted); transition: background .15s; }
    .act-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .act-btn.del:hover { color: var(--danger); background: rgba(251,113,133,0.1); }
    .act-btn.fav-on { color: #facc15; }

    /* Launch buttons */
    .launch-row { display: flex; gap: 8px; padding: 0 12px 12px; }
    .btn-current { flex: 1; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted); font-size: 12px; transition: background .15s; }
    .btn-current:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .btn-next { flex: 2; height: 48px; border-radius: 12px; background: var(--accent); color: #0f172a; font-size: 15px; font-weight: 800; transition: opacity .15s; box-shadow: 0 2px 10px rgba(96,165,250,0.2); }
    .btn-next:hover { opacity: 0.88; }
    .btn-done { flex: 1; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted); font-size: 12px; transition: background .15s; }
    .btn-done:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    /* Memo */
    .bm-memo { font-size: 12px; color: rgba(241,245,249,0.75); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; padding: 7px 10px; margin: 0 12px 10px; word-break: break-word; white-space: pre-wrap; }

    /* History */
    .hist-toggle { background: transparent; border: none; color: rgba(100,116,139,0.6); font-size: 10px; padding: 4px 12px 8px; display: flex; align-items: center; gap: 5px; cursor: pointer; width: 100%; text-align: left; }
    .hist-toggle:hover { color: var(--muted); }
    .hist-list { padding: 0 12px 10px; display: flex; flex-direction: column; gap: 4px; }
    .hist-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.04); border-radius: 6px; padding: 5px 10px; font-size: 10px; font-family: ui-monospace, monospace; text-decoration: none; color: inherit; }
    .hist-item:hover { background: rgba(255,255,255,0.08); }
    .hist-ep { color: var(--accent); }
    .hist-date { color: var(--muted); }

    /* Add form */
    .form-card { background: rgba(17,24,39,0.5); border: 1px solid var(--border); border-radius: 18px; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .form-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .toggle-add { width: 100%; height: 44px; border-radius: 12px; border: 1px dashed rgba(100,116,139,0.4); background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; transition: border-color .15s, color .15s; }
    .toggle-add:hover { border-color: var(--accent-border); color: var(--accent); }

    /* Empty */
    .empty { text-align: center; padding: 40px 0; color: var(--muted); font-size: 13px; border: 1px dashed var(--border); border-radius: 18px; }

    /* iPhone shortcut */
    .shortcut { background: rgba(17,24,39,0.4); border: 1px solid var(--border); border-radius: 16px; }
    .shortcut-head { display: flex; align-items: center; justify-content: space-between; padding: 14px; cursor: pointer; }
    .shortcut-body { padding: 0 14px 14px; display: flex; flex-direction: column; gap: 10px; font-size: 12px; }
    .code-block { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-family: ui-monospace, monospace; font-size: 10px; color: var(--accent); word-break: break-all; }
    .steps { color: var(--muted); line-height: 1.9; padding-left: 16px; }
    .steps strong { color: var(--text); }

    /* Toast */
    #toasts { position: fixed; top: calc(env(safe-area-inset-top, 0px) + 10px); left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 6px; width: calc(100% - 32px); max-width: 420px; pointer-events: none; }
    .toast { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 12px; font-size: 13px; font-weight: 500; box-shadow: 0 4px 24px rgba(0,0,0,0.5); animation: tin .2s ease; backdrop-filter: blur(8px); }
    .toast.ok { background: var(--ok); border: 1px solid var(--ok-b); color: #6ee7b7; }
    .toast.info { background: var(--info); border: 1px solid var(--info-b); color: #93c5fd; }
    .toast.err { background: var(--err); border: 1px solid var(--err-b); color: #fda4af; }
    @keyframes tin { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    hr { border: none; border-top: 1px solid var(--border); }

    /* Clipboard detect popup */
    .clip-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.55); backdrop-filter: blur(4px); display: flex; align-items: flex-end; justify-content: center; padding: 16px; }
    @media (min-width:480px) { .clip-overlay { align-items: center; } }
    .clip-modal { width: 100%; max-width: 380px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.6); animation: modalin .22s ease; }
    @keyframes modalin { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .clip-body { padding: 20px 20px 16px; }
    .clip-icon { font-size: 28px; margin-bottom: 10px; }
    .clip-title { font-size: 16px; font-weight: 700; line-height: 1.3; }
    .clip-sub { font-size: 11px; font-family: ui-monospace, monospace; color: var(--muted); margin-top: 8px; word-break: break-all; }
    .clip-actions { display: flex; border-top: 1px solid var(--border); }
    .clip-ignore { flex: 1; padding: 14px; background: transparent; color: var(--muted); font-size: 14px; font-weight: 500; border-right: 1px solid var(--border); border-radius: 0; }
    .clip-confirm { flex: 1; padding: 14px; background: transparent; color: var(--accent); font-size: 14px; font-weight: 700; border-radius: 0; }
    .clip-ignore:hover { background: rgba(255,255,255,0.04); }
    .clip-confirm:hover { background: var(--accent-dim); }
    .clip-already { padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  </style>
</head>
<body>
<div id="toasts"></div>

<!-- Clipboard detect popup -->
<div id="clipOverlay" class="clip-overlay" style="display:none" onclick="if(event.target===this)closeClipPopup()">
  <div class="clip-modal" id="clipModal">
    <!-- filled by JS -->
  </div>
</div>

<div class="wrap">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-icon"><img src="icon.svg" alt="웹툰 런처" /></div>
      <div>
        <h1>웹툰 런처</h1>
        <p id="hdr-count">0개 작품 저장됨</p>
      </div>
    </div>
    <button class="icon-btn" onclick="toggleSettings()" title="설정">⚙️</button>
  </div>

  <!-- Settings panel -->
  <div class="settings" id="settingsPanel" style="display:none">
    <div class="settings-title">⚙️ 설정</div>
    <div class="field">
      <label>🌐 기본 도메인</label>
      <input id="defaultDomainInput" class="mono" placeholder="blacktoon414.com" onblur="saveDefaultDomain()" />
    </div>
    <hr />
    <div class="field">
      <label>전체 도메인 일괄 변경</label>
      <div class="split">
        <input id="bulkDomain" class="mono" placeholder="newsite.com" />
        <button class="btn-primary btn-sm" onclick="handleBulkDomain()" style="flex-shrink:0;">적용</button>
      </div>
    </div>
    <hr />
    <div class="btn-row">
      <button class="btn-secondary btn-sm" onclick="handleBackup()">⬇ JSON 백업</button>
      <button class="btn-secondary btn-sm btn-file">⬆ 복원<input type="file" accept="application/json" onchange="handleRestore(event)" /></button>
      <button class="btn-danger" onclick="handleClearAll()">전체 삭제</button>
    </div>
  </div>

  <!-- Clipboard button -->
  <button class="clip-btn" onclick="handleClipboard()">
    📋 클립보드 링크 추가
  </button>

  <!-- Search -->
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input id="search" placeholder="작품명, ID 검색" oninput="render()" />
  </div>

  <!-- Bookmark list -->
  <div id="list"></div>

  <!-- Toggle add form -->
  <button class="toggle-add" id="toggleAddBtn" onclick="toggleForm()">+ 직접 추가</button>

  <!-- Add / Edit form -->
  <div class="form-card" id="formCard" style="display:none">
    <div class="form-title" id="formTitle">➕ 새 작품 추가</div>

    <div class="field">
      <label>URL 붙여넣기 → 자동 분석</label>
      <div class="split">
        <input id="urlInput" class="mono" placeholder="https://사이트.com/webtoons/작품ID/회차ID.html" />
        <button class="btn-secondary btn-sm" onclick="handleParseUrl()" style="flex-shrink:0;">분석</button>
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>작품명 <span style="color:var(--muted);opacity:.6">(선택)</span></label>
        <input id="fTitle" placeholder="자동: webtoons-{ID}" />
      </div>
      <div class="field">
        <label>도메인</label>
        <input id="fDomain" class="mono" placeholder="example.com" />
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>작품 ID</label>
        <input id="fWorkId" class="mono" inputmode="numeric" placeholder="12345" />
      </div>
      <div class="field">
        <label>회차 ID</label>
        <input id="fEpisodeId" class="mono" inputmode="numeric" placeholder="89" />
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>약칭 배지 <span style="color:var(--muted);opacity:.6">(2~3자)</span></label>
        <input id="fAbbr" placeholder="화산" maxlength="3" style="text-align:center;font-weight:700;" />
      </div>
      <div class="field">
        <label>🖼 표지 URL <span style="color:var(--muted);opacity:.6">(선택)</span></label>
        <input id="fCoverUrl" class="mono" placeholder="https://..." />
      </div>
    </div>

    <div class="field">
      <label>메모 <span style="color:var(--muted);opacity:.6">(선택)</span></label>
      <textarea id="fMemo" placeholder="여기까지 봄…"></textarea>
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="saveBtn" onclick="handleSave()" style="flex:1;height:44px;">저장</button>
      <button class="btn-ghost" onclick="resetForm()">취소</button>
    </div>
  </div>

  <!-- iPhone shortcut -->
  <div class="shortcut">
    <div class="shortcut-head" onclick="toggleShortcut()">
      <div>
        <div style="font-size:13px;font-weight:600;">📱 iPhone 단축어 자동 저장</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;">Safari 공유 → 한 번에 회차 기록</div>
      </div>
      <span id="shortcutArrow" style="color:var(--muted);">▼</span>
    </div>
    <div id="shortcutBody" style="display:none" class="shortcut-body">
      <p style="color:var(--muted);">Safari에서 웹툰 페이지 공유 → 단축어 → 아래 URL로 자동 저장됩니다.</p>
      <div class="code-block" id="shortcutUrl"></div>
      <ol class="steps">
        <li>iPhone <strong>단축어</strong> 앱 → <strong>+</strong></li>
        <li><strong>Safari에서 열기</strong> 동작 추가</li>
        <li>URL에 위 주소 붙여넣기 + <strong>단축어 입력</strong> 변수 추가</li>
        <li>이름을 <strong>웹툰 기록</strong>으로 저장</li>
        <li>Safari 공유 시트에서 단축어 탭 → 자동 저장!</li>
      </ol>
      <button class="btn-secondary btn-sm" style="align-self:flex-start;" onclick="copyShortcut()">URL 복사</button>
    </div>
  </div>

</div><!-- /wrap -->
<script>
/* ── Storage ────────────────────────────────────────────── */
const KEY = 'webtoon_bookmarks_v1';
const DOM_KEY = 'webtoon_default_domain';
let data = [];
let editingId = null;
let formOpen = false;
let settingsOpen = false;
let expandedHist = new Set();

function load() {
  try {
    const raw = JSON.parse(localStorage.getItem(KEY) || '[]');
    data = raw.map(b => ({
      id: b.id,
      title: b.title || `webtoons-${b.workId||''}`,
      category: b.category || 'webtoons',
      domain: b.domain || '',
      workId: b.workId || '',
      episodeId: b.episodeId || '1',
      memo: b.memo || '',
      updatedAt: b.updatedAt || new Date().toISOString(),
      history: b.history || [],
      favorite: b.favorite ?? false,
      abbr: b.abbr || '',
      coverUrl: b.coverUrl || '',
    }));
  } catch { data = []; }
}
function persist() { localStorage.setItem(KEY, JSON.stringify(data)); }

function getDefaultDomain() { return localStorage.getItem(DOM_KEY) || ''; }
function saveDefaultDomain() {
  const v = normDomain(document.getElementById('defaultDomainInput').value);
  document.getElementById('defaultDomainInput').value = v;
  localStorage.setItem(DOM_KEY, v);
}

/* ── Utils ──────────────────────────────────────────────── */
function makeUrl(domain, category, workId, episodeId) {
  return `https://${domain}/${category}/${workId}/${episodeId}.html`;
}
function autoTitle(category, workId) { return `${category}-${workId}`; }

function parseWebtoonUrl(raw) {
  try {
    const url = new URL(raw.trim());
    const p = url.pathname.split('/').filter(Boolean);
    const cat = p[0] || 'webtoons', work = p[1] || '', ep = (p[2]||'').replace(/\.html?$/,'');
    if (!work || !ep) return null;
    return { domain: url.host, category: cat, workId: work, episodeId: ep };
  } catch { return null; }
}
function normDomain(v) { return (v||'').trim().replace(/^https?:\/\//,'').replace(/\/.*$/,''); }

function workIdColor(workId) {
  let hash = 0;
  for (let i = 0; i < workId.length; i++) hash = workId.charCodeAt(i) + ((hash << 5) - hash);
  return `hsl(${Math.abs(hash)%360},60%,58%)`;
}
function autoAbbr(title, workId) {
  if (title && !title.startsWith('webtoons-')) {
    const ko = title.match(/[\uAC00-\uD7A3]/g);
    if (ko && ko.length >= 2) return ko.slice(0,2).join('');
    return title.slice(0,3);
  }
  return workId.slice(0,3);
}
function upsertHist(history, entry) {
  const idx = history.findIndex(h => h.episodeId === entry.episodeId);
  if (idx === -1) return [...history, entry];
  const c = [...history]; c[idx] = {...c[idx], viewedAt: entry.viewedAt}; return c;
}
function esc(s) { return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function sorted() {
  const q = document.getElementById('search').value.toLowerCase();
  return [...data]
    .filter(b => (b.title+b.workId+b.episodeId+b.memo).toLowerCase().includes(q))
    .sort((a,b) => {
      if (a.favorite && !b.favorite) return -1;
      if (!a.favorite && b.favorite) return 1;
      return new Date(b.updatedAt) - new Date(a.updatedAt);
    });
}

/* ── Toast ──────────────────────────────────────────────── */
let tc = 0;
function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icon = type==='ok'?'✓':type==='err'?'✕':'ℹ';
  el.innerHTML = `<span>${icon}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(msg)}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}

/* ── Clipboard detect ────────────────────────────────────── */
const IGNORED_CLIP_KEY = 'webtoon_ignored_clipboard_url';
let _clipParsed = null, _clipRaw = '';

async function initClipboardDetect() {
  try {
    const text = await navigator.clipboard.readText();
    if (!text) return;
    const raw = text.trim();
    const parsed = parseWebtoonUrl(raw);
    if (!parsed) return;
    const ignored = localStorage.getItem(IGNORED_CLIP_KEY);
    if (ignored === raw) return;
    const existing = data.find(b => b.workId === parsed.workId);
    if (existing && existing.episodeId === parsed.episodeId &&
        existing.history.some(h => h.episodeId === parsed.episodeId)) {
      showClipAlready();
      return;
    }
    _clipParsed = parsed; _clipRaw = raw;
    showClipConfirm(parsed);
  } catch {
    /* 권한 없음 or 실패 → 조용히 무시 */
  }
}

function showClipConfirm(parsed) {
  document.getElementById('clipModal').innerHTML = `
    <div class="clip-body">
      <div class="clip-icon">📋</div>
      <div class="clip-title">복사한 웹툰 링크를 추가할까요?</div>
      <div class="clip-sub">${esc(parsed.domain)} · ${esc(parsed.workId)} · ${esc(parsed.episodeId)}화</div>
    </div>
    <div class="clip-actions">
      <button class="clip-ignore" onclick="clipIgnore()">무시</button>
      <button class="clip-confirm" onclick="clipConfirm()">추가</button>
    </div>`;
  document.getElementById('clipOverlay').style.display = 'flex';
}

function showClipAlready() {
  document.getElementById('clipModal').innerHTML = `
    <div class="clip-already">
      <span style="font-size:22px">✓</span>
      <div>
        <div style="font-size:14px;font-weight:700;">이미 저장된 회차예요</div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px;">클립보드의 링크가 이미 기록에 있습니다.</div>
      </div>
    </div>`;
  document.getElementById('clipOverlay').style.display = 'flex';
  setTimeout(closeClipPopup, 2500);
}

function clipConfirm() {
  if (!_clipParsed) return;
  autoSave(_clipParsed);
  closeClipPopup();
}

function clipIgnore() {
  if (_clipRaw) localStorage.setItem(IGNORED_CLIP_KEY, _clipRaw);
  closeClipPopup();
}

function closeClipPopup() {
  document.getElementById('clipOverlay').style.display = 'none';
  _clipParsed = null; _clipRaw = '';
}

/* ── Clipboard manual button ─────────────────────────────── */
async function handleClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    const parsed = parseWebtoonUrl(text);
    if (!parsed) { toast('클립보드에 유효한 웹툰 URL이 없어요', 'err'); return; }
    autoSave(parsed);
  } catch {
    toast('클립보드 접근 실패 — URL을 아래 입력칸에 붙여넣어 주세요', 'err');
    openForm();
  }
}
function autoSave(parsed) {
  const existing = data.find(b => b.workId === parsed.workId);
  if (existing) {
    const now = new Date().toISOString();
    const url = makeUrl(parsed.domain, parsed.category, parsed.workId, parsed.episodeId);
    existing.episodeId = parsed.episodeId; existing.domain = parsed.domain; existing.updatedAt = now;
    existing.history = upsertHist(existing.history, {episodeId: parsed.episodeId, url, viewedAt: now});
    persist(); render();
    toast(`"${existing.title}" ${parsed.episodeId}화로 업데이트됨`);
  } else {
    const title = autoTitle(parsed.category, parsed.workId);
    const now = new Date().toISOString();
    const url = makeUrl(parsed.domain, parsed.category, parsed.workId, parsed.episodeId);
    data.unshift({ id: Date.now().toString(36), title, category: parsed.category, domain: parsed.domain, workId: parsed.workId, episodeId: parsed.episodeId, memo: '', updatedAt: now, history: [{episodeId: parsed.episodeId, url, viewedAt: now}], favorite: false, abbr: '', coverUrl: '' });
    if (parsed.domain) localStorage.setItem(DOM_KEY, parsed.domain);
    persist(); render();
    toast(`클립보드 링크 저장 완료: "${title}"`);
  }
  if (parsed.domain) document.getElementById('defaultDomainInput').value = parsed.domain;
}

/* ── URL param ──────────────────────────────────────────── */
function handleUrlParam() {
  const raw = new URLSearchParams(location.search).get('url');
  if (!raw) return;
  history.replaceState({}, '', location.pathname);
  const parsed = parseWebtoonUrl(decodeURIComponent(raw));
  if (!parsed) return;
  autoSave(parsed);
}

/* ── Form ───────────────────────────────────────────────── */
function openForm() {
  formOpen = true;
  document.getElementById('formCard').style.display = '';
  document.getElementById('toggleAddBtn').textContent = '✕ 닫기';
  setTimeout(() => document.getElementById('formCard').scrollIntoView({behavior:'smooth'}), 60);
}
function toggleForm() {
  if (formOpen && !editingId) { resetForm(); return; }
  openForm();
  document.getElementById('fDomain').value = getDefaultDomain();
}
function resetForm() {
  editingId = null; formOpen = false;
  ['urlInput','fTitle','fDomain','fWorkId','fEpisodeId','fMemo','fAbbr','fCoverUrl'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('formTitle').textContent = '➕ 새 작품 추가';
  document.getElementById('saveBtn').textContent = '저장';
  document.getElementById('formCard').style.display = 'none';
  document.getElementById('toggleAddBtn').textContent = '+ 직접 추가';
}
function handleParseUrl() {
  const parsed = parseWebtoonUrl(document.getElementById('urlInput').value);
  if (!parsed) { toast('URL 형식을 확인해주세요.','err'); return; }
  document.getElementById('fDomain').value = parsed.domain;
  document.getElementById('fWorkId').value = parsed.workId;
  document.getElementById('fEpisodeId').value = parsed.episodeId;
}
function handleSave() {
  const workId = document.getElementById('fWorkId').value.trim();
  const episodeId = document.getElementById('fEpisodeId').value.trim();
  const rawDomain = document.getElementById('fDomain').value;
  const domain = normDomain(rawDomain || getDefaultDomain());
  if (!workId || !episodeId) { toast('작품ID와 회차ID를 입력해주세요.','err'); return; }
  if (!domain) { toast('도메인을 입력해주세요.','err'); return; }
  const title = document.getElementById('fTitle').value.trim() || autoTitle('webtoons', workId);
  const memo = document.getElementById('fMemo').value.trim();
  const abbr = document.getElementById('fAbbr').value.trim();
  const coverUrl = document.getElementById('fCoverUrl').value.trim();
  const now = new Date().toISOString();
  if (domain) localStorage.setItem(DOM_KEY, domain);

  if (editingId) {
    const b = data.find(x => x.id === editingId);
    if (b) Object.assign(b, {title, domain, workId, episodeId, memo, abbr, coverUrl, updatedAt: now});
    persist(); render(); toast('수정 완료');
  } else {
    const existing = data.find(b => b.workId === workId);
    if (existing) {
      const url = makeUrl(domain, existing.category, workId, episodeId);
      existing.episodeId = episodeId; existing.domain = domain; existing.updatedAt = now;
      existing.history = upsertHist(existing.history, {episodeId, url, viewedAt: now});
      persist(); render(); toast(`"${existing.title}" ${episodeId}화로 업데이트됨`);
    } else {
      const url = makeUrl(domain, 'webtoons', workId, episodeId);
      data.unshift({id:Date.now().toString(36), title, category:'webtoons', domain, workId, episodeId, memo, updatedAt:now, history:[{episodeId,url,viewedAt:now}], favorite:false, abbr, coverUrl});
      persist(); render(); toast(`"${title}" 저장됨`);
    }
  }
  resetForm();
}

/* ── Edit ───────────────────────────────────────────────── */
function handleEdit(id) {
  const b = data.find(x=>x.id===id); if (!b) return;
  editingId = id;
  document.getElementById('urlInput').value = makeUrl(b.domain,b.category,b.workId,b.episodeId);
  document.getElementById('fTitle').value = b.title;
  document.getElementById('fDomain').value = b.domain;
  document.getElementById('fWorkId').value = b.workId;
  document.getElementById('fEpisodeId').value = b.episodeId;
  document.getElementById('fMemo').value = b.memo;
  document.getElementById('fAbbr').value = b.abbr || '';
  document.getElementById('fCoverUrl').value = b.coverUrl || '';
  document.getElementById('formTitle').textContent = '✏️ 작품 수정';
  document.getElementById('saveBtn').textContent = '수정 완료';
  openForm();
}

/* ── Launch ─────────────────────────────────────────────── */
function handleNext(id) {
  const b = data.find(x=>x.id===id); if (!b) return;
  const n = parseInt(b.episodeId,10); if (isNaN(n)) return;
  const now = new Date().toISOString(), ep = String(n+1);
  const url = makeUrl(b.domain,b.category,b.workId,ep);
  b.episodeId=ep; b.updatedAt=now; b.history=upsertHist(b.history,{episodeId:ep,url,viewedAt:now});
  persist(); render();
  window.open(url,'_blank','noopener,noreferrer');
  toast(`"${b.title}" ${ep}화 이어보기`);
}
function handleCurrent(id) {
  const b = data.find(x=>x.id===id); if (!b) return;
  const now = new Date().toISOString();
  const url = makeUrl(b.domain,b.category,b.workId,b.episodeId);
  b.updatedAt=now; b.history=upsertHist(b.history,{episodeId:b.episodeId,url,viewedAt:now});
  persist(); render();
  window.open(url,'_blank','noopener,noreferrer');
  toast(`"${b.title}" ${b.episodeId}화 읽기`);
}
function handleComplete(id) {
  const b = data.find(x=>x.id===id); if (!b) return;
  const n = parseInt(b.episodeId,10); if (isNaN(n)) return;
  const now = new Date().toISOString(), ep = String(n+1);
  const url = makeUrl(b.domain,b.category,b.workId,ep);
  b.episodeId=ep; b.updatedAt=now; b.history=upsertHist(b.history,{episodeId:ep,url,viewedAt:now});
  persist(); render();
  toast(`"${b.title}" ${ep}화로 업데이트됨`);
}

/* ── Episode inline edit ────────────────────────────────── */
function startEpEdit(id) {
  const b = data.find(x=>x.id===id); if (!b) return;
  const container = document.getElementById(`ep-${esc(id)}`);
  if (!container) return;
  container.innerHTML = `<input class="ep-input" id="ep-inp-${esc(id)}" value="${esc(b.episodeId)}" inputmode="numeric" onblur="commitEp('${esc(id)}')" onkeydown="if(event.key==='Enter')commitEp('${esc(id)}')" />화`;
  setTimeout(() => document.getElementById(`ep-inp-${id}`)?.focus(), 10);
}
function commitEp(id) {
  const input = document.getElementById(`ep-inp-${id}`); if (!input) return;
  const val = input.value.trim();
  const b = data.find(x=>x.id===id); if (!b) return;
  if (val && val !== b.episodeId) {
    const now = new Date().toISOString();
    const url = makeUrl(b.domain,b.category,b.workId,val);
    b.episodeId=val; b.updatedAt=now; b.history=upsertHist(b.history,{episodeId:val,url,viewedAt:now});
    persist();
  }
  render();
}

/* ── Favorite / Delete ──────────────────────────────────── */
function handleFavorite(id) {
  const b = data.find(x=>x.id===id); if (!b) return;
  b.favorite = !b.favorite; persist(); render();
}
function handleDelete(id) {
  const b = data.find(x=>x.id===id); if (!b) return;
  if (!confirm(`"${b.title}" 삭제하시겠습니까?`)) return;
  data = data.filter(x=>x.id!==id); persist(); render();
}

/* ── Settings ───────────────────────────────────────────── */
function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById('settingsPanel').style.display = settingsOpen ? '' : 'none';
  if (settingsOpen) document.getElementById('defaultDomainInput').value = getDefaultDomain();
}
function handleBulkDomain() {
  const d = normDomain(document.getElementById('bulkDomain').value);
  if (!d) { toast('새 도메인을 입력해주세요.','err'); return; }
  if (!confirm(`모든 작품의 도메인을 "${d}"로 바꿀까요?`)) return;
  const now = new Date().toISOString();
  data = data.map(b=>({...b,domain:d,updatedAt:now}));
  localStorage.setItem(DOM_KEY, d);
  document.getElementById('defaultDomainInput').value = d;
  document.getElementById('bulkDomain').value = '';
  persist(); render(); toast('도메인 일괄 변경 완료');
}
function handleBackup() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download = 'webtoon-bookmarks.json'; a.click();
}
function handleRestore(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const arr = JSON.parse(r.result);
      if (!Array.isArray(arr)) throw 0;
      const merge = confirm('기존 기록에 합칠까요?\n취소: 덮어씌웁니다.');
      const mig = arr.map(b=>({...b,history:b.history||[],favorite:b.favorite??false,abbr:b.abbr||'',coverUrl:b.coverUrl||''}));
      data = merge ? [...mig,...data.filter(p=>!mig.some(i=>i.id===p.id))] : mig;
      persist(); render(); toast('복원 완료');
    } catch { toast('JSON 파일을 확인해주세요.','err'); }
  };
  r.readAsText(f); e.target.value='';
}
function handleClearAll() {
  if (!confirm('정말로 모든 북마크를 삭제하시겠습니까?')) return;
  data=[]; persist(); render(); toast('전체 삭제됨','info');
}

/* ── Shortcut ───────────────────────────────────────────── */
function toggleShortcut() {
  const b = document.getElementById('shortcutBody');
  const a = document.getElementById('shortcutArrow');
  const open = b.style.display==='none';
  b.style.display = open ? '' : 'none';
  a.textContent = open ? '▲' : '▼';
}
function copyShortcut() {
  const url = `${location.origin}${location.pathname}?url=[현재 URL]`;
  navigator.clipboard?.writeText(url).then(()=>toast('URL 복사됨')).catch(()=>toast('복사 실패','err'));
}

/* ── Render ─────────────────────────────────────────────── */
function render() {
  const list = sorted();
  document.getElementById('hdr-count').textContent = `${data.length}개 작품 저장됨`;
  const el = document.getElementById('list');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div style="font-size:32px;margin-bottom:10px">📚</div>${data.length===0?'클립보드 버튼으로 첫 작품을 추가해보세요!':'검색 결과가 없습니다.'}</div>`;
    return;
  }
  el.innerHTML = list.map(b => {
    const color = workIdColor(b.workId);
    const abbr = b.abbr || autoAbbr(b.title, b.workId);
    const recentHist = [...(b.history||[])].sort((a,c)=>new Date(c.viewedAt)-new Date(a.viewedAt)).slice(0,5);
    const histOpen = expandedHist.has(b.id);
    const leftImg = b.coverUrl
      ? `<img src="${esc(b.coverUrl)}" class="bm-cover" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt="" /><div class="bm-badge" style="background:${color};display:none">${esc(abbr)}</div>`
      : `<div class="bm-badge" style="background:${color}">${esc(abbr)}</div>`;
    return `<div class="bm-card${b.favorite?' fav':''}">
  <div class="bm-top">
    ${leftImg}
    <div class="bm-info">
      <div class="bm-title">${b.favorite?'<span class="bm-star">★</span>':''}${esc(b.title)}</div>
      <div class="bm-meta">
        <span id="ep-${esc(b.id)}" onclick="startEpEdit('${esc(b.id)}')" class="ep-badge">${esc(b.episodeId)}화 <span style="font-size:9px;opacity:.6">✎</span></span>
        <span class="bm-domain">${esc(b.domain)}</span>
      </div>
    </div>
    <div class="bm-actions">
      <button class="act-btn${b.favorite?' fav-on':''}" onclick="handleFavorite('${esc(b.id)}')" title="${b.favorite?'즐겨찾기 해제':'즐겨찾기'}">★</button>
      <button class="act-btn" onclick="handleEdit('${esc(b.id)}')" title="수정">✏️</button>
      <button class="act-btn del" onclick="handleDelete('${esc(b.id)}')" title="삭제">🗑️</button>
    </div>
  </div>
  ${b.memo?`<div class="bm-memo">${esc(b.memo)}</div>`:''}
  <div class="launch-row">
    <button class="btn-current" onclick="handleCurrent('${esc(b.id)}')">📖 현재화</button>
    <button class="btn-next" onclick="handleNext('${esc(b.id)}')">▶ 이어보기</button>
    <button class="btn-done" onclick="handleComplete('${esc(b.id)}')">✓ 완료</button>
  </div>
  ${recentHist.length?`
  <button class="hist-toggle" onclick="(()=>{expandedHist.has('${esc(b.id)}')?expandedHist.delete('${esc(b.id)}'):expandedHist.add('${esc(b.id)}');render()})()">
    🕐 최근: ${recentHist.slice(0,5).map(h=>`${esc(h.episodeId)}화`).join(', ')}
    <span style="margin-left:auto">${histOpen?'▲':'▼'}</span>
  </button>
  ${histOpen?`<div class="hist-list">${recentHist.map(h=>`<a class="hist-item" href="${esc(h.url)}" target="_blank" rel="noopener noreferrer"><span class="hist-ep">${esc(h.episodeId)}화</span><span class="hist-date">${new Date(h.viewedAt).toLocaleDateString('ko-KR')}</span></a>`).join('')}</div>`:''}
  `:''}
</div>`;
  }).join('');
}

/* ── Init ───────────────────────────────────────────────── */
load();
handleUrlParam();
render();
document.getElementById('shortcutUrl').textContent = `${location.origin}${location.pathname}?url=[현재 URL]`;
document.getElementById('defaultDomainInput').value = getDefaultDomain();

// 클립보드 자동 감지 (앱 열릴 때 한 번만)
initClipboardDetect();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js').catch(()=>{});
}
</script>
