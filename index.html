<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="웹툰 런처" />
  <title>웹툰 런처</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="toasts"></div>
<div id="updateBanner" class="update-banner" hidden>
  <span>새 버전이 있어요.</span>
  <button type="button" class="update-banner-btn" onclick="handleApplyUpdate()">업데이트</button>
</div>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
        <rect width="512" height="512" rx="110" fill="#111827"/>
        <path d="M132 120h248a36 36 0 0 1 36 36v244l-64-42H132a36 36 0 0 1-36-36V156a36 36 0 0 1 36-36z" fill="#60a5fa"/>
        <path d="M154 180h204v32H154zm0 70h164v32H154zm0 70h116v32H154z" fill="#0f172a"/>
      </svg>
    </div>
    <div>
      <h1>웹툰 런처</h1>
      <p>저장된 회차를 도메인 번호만 바꿔 바로 여는 런처</p>
    </div>
  </div>

  <!-- Clipboard import (optional auto) -->
  <button type="button" class="clipboard-import-btn" onclick="handleClipboardImport()">
    <span class="clipboard-import-label">📋 복사한 웹툰 추가</span>
    <span class="clipboard-import-desc">복사한 링크를 폼에 불러와 실제 회차를 입력하세요.</span>
  </button>

  <!-- Paste import (primary for iPhone Safari) -->
  <div class="paste-import">
    <input
      id="pasteUrl"
      class="paste-import-input mono"
      type="url"
      inputmode="url"
      autocapitalize="off"
      autocorrect="off"
      spellcheck="false"
      placeholder="웹툰 주소를 여기에 붙여넣기"
    />
    <button type="button" class="paste-import-btn btn-primary" onclick="handlePasteSave()">저장</button>
  </div>

  <!-- Site number setting -->
  <div class="card">
    <div class="card-title">현재 사이트 번호</div>
    <div class="card-desc">blacktoon 도메인 번호입니다. 예: 415 → blacktoon415.com</div>
    <div class="split">
      <input id="siteNumber" class="mono" inputmode="numeric" placeholder="415" />
      <button class="btn-primary btn-sm" onclick="handleSaveSiteNumber()" style="flex-shrink:0;">사이트 번호 저장</button>
    </div>
    <div class="site-actions">
      <button type="button" id="autoFindBtn" class="btn-auto-find" onclick="handleAutoFindSiteNumber()">🌐 사이트 번호 자동 찾기</button>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search" placeholder="작품명, 약칭, 메모, ID 검색" oninput="render()" />
  </div>

  <!-- Saved works list -->
  <div id="list"></div>

  <!-- Advanced / manual section -->
  <div class="card">
    <div class="section-title-row" onclick="toggleAdvanced()">
      <div class="card-title" style="margin-bottom:0">고급 수동 추가</div>
      <span id="advancedArrow" style="color:var(--muted);font-size:14px;">▼</span>
    </div>
    <div class="advanced-content" id="advancedContent">
      <div style="display:flex;flex-direction:column;gap:14px;margin-top:12px;">
        <!-- Manual add / edit form -->
        <div id="formCard">
          <div class="card-title" id="formTitle" style="margin-bottom:8px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--accent)"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            새 작품 추가
          </div>
          <div style="display:flex;flex-direction:column;gap:12px;">
            <div class="field">
              <label>웹툰 URL 붙여넣기</label>
              <div class="split">
                <input id="urlInput" class="mono" placeholder="https://blacktoon415.com/webtoons/17731/1621901.html" />
                <button class="btn-secondary btn-sm" onclick="handleParseUrl()" style="flex-shrink:0;white-space:nowrap;">분석</button>
              </div>
            </div>
            <div class="row2">
              <div class="field"><label>작품명</label><input id="fTitle" placeholder="예: 화산귀환" /></div>
              <div class="field"><label>약칭 (2~4글자)</label><input id="fNickname" maxlength="4" placeholder="예: 화귀" /></div>
            </div>
            <div class="row2">
              <div class="field"><label>카테고리</label><input id="fCategory" class="mono" placeholder="webtoons" /></div>
              <div class="field"><label>도메인</label><input id="fDomain" class="mono" placeholder="blacktoon415.com" /></div>
            </div>
            <div class="row2">
              <div class="field"><label>작품 ID</label><input id="fWorkId" class="mono" placeholder="17731" /></div>
              <div class="field"><label>회차 ID</label><input id="fEpisodeId" class="mono" placeholder="1621901" /></div>
            </div>
            <div class="field">
              <label>실제 회차</label>
              <input id="fDisplayEpisode" placeholder="예: 82화" />
            </div>
            <div class="field"><label>메모</label><textarea id="fMemo" placeholder="예: 메모"></textarea></div>
            <div class="btn-row">
              <button class="btn-primary" id="saveBtn" onclick="handleSave()">저장</button>
              <button class="btn-ghost" onclick="resetForm()">초기화</button>
            </div>
          </div>
        </div>

        <!-- Tools -->
        <div class="tools">
          <div class="card" style="padding:12px;">
            <div class="card-title">새 도메인 일괄 적용</div>
            <div class="split">
              <input id="bulkDomain" class="mono" placeholder="blacktoon415.com" />
              <button class="btn-primary btn-sm" onclick="handleBulkDomain()" style="flex-shrink:0;">적용</button>
            </div>
          </div>
          <div class="card" style="padding:12px;">
            <div class="card-title">데이터 관리</div>
            <div class="btn-row">
              <button class="btn-secondary btn-sm" onclick="handleBackup()">JSON 백업</button>
              <button class="btn-secondary btn-sm btn-file">
                복원
                <input type="file" accept="application/json" onchange="handleRestore(event)" />
              </button>
              <button class="btn-danger btn-sm" onclick="handleClearAll()">전체 삭제</button>
            </div>
          </div>
        </div>

        <!-- iPhone shortcut -->
        <div>
          <div class="section-title-row" onclick="toggleShortcut()">
            <div class="card-title" style="margin-bottom:0">iPhone 단축어로 자동 저장</div>
            <span id="shortcutArrow" style="color:var(--muted);font-size:14px;">▼</span>
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px;">Safari 공유 버튼 한 번으로 현재 회차를 자동 기록</div>
          <div class="shortcut-content" id="shortcutContent">
            <div style="margin-top:12px;font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:8px;">
              <div class="code-block" id="shortcutUrl">로딩 중...</div>
              <div class="info-box">기존 작품이면 회차만 업데이트되고, 신규 작품은 webtoons-작품ID로 자동 저장됩니다.</div>
              <button class="btn-secondary btn-sm" style="align-self:flex-start;" onclick="copyShortcutUrl()">단축어 URL 복사</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="app-footer">Webtoon Launcher v2.0.4</footer>

</div><!-- /wrap -->

<script type="module" src="js/app.js"></script>
</body>
</html>
